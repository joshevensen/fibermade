# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "d7694a203b15b9f571764e04c857bb89"
name = "fibermade"
application_url = "https://shopify.fibermade.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["products/create"]
  uri = "https://fibermade.app/webhooks/shopify/products/create"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "https://fibermade.app/webhooks/shopify/products/update"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "https://fibermade.app/webhooks/shopify/products/delete"

  [[webhooks.subscriptions]]
  topics = ["collections/create"]
  uri = "https://fibermade.app/webhooks/shopify/collections/create"

  [[webhooks.subscriptions]]
  topics = ["collections/update"]
  uri = "https://fibermade.app/webhooks/shopify/collections/update"

  [[webhooks.subscriptions]]
  topics = ["collections/delete"]
  uri = "https://fibermade.app/webhooks/shopify/collections/delete"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products"

[auth]
redirect_urls = [ "https://shopify.fibermade.app/auth/callback" ]
